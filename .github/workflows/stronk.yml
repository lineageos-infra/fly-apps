name: Deploy to app01
on:
  push:
    branches:
      - main
    paths:
      - 'stronk/**'
jobs:
  deploy:
    name: Deploy stronk
    runs-on: ubuntu-latest
    steps:
      - uses: lineageos-infra/app01-deploy@main
        with:
          api_key: ${{ secrets.APP01_API_KEY }}
          app: stronk
